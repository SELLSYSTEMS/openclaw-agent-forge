name: smoke-check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f QUICKSTART.md
          test -f LICENSE
          test -f docs/shared-host-context.md
          test -f docs/agent-topology.md
          test -f docs/data-sources.md
          test -f docs/memory-architecture.md
          test -f docs/model-policy.md
          test -f docs/installer-capability-contract.md
          test -f docs/stt-path.md
          test -f docs/codex-cli-tui.md
          test -f docs/orchestrator-roadmap.md
          test -f docs/prompt-patterns.md
          test -f docs/telegram-test-plan.md
          test -f systemd/openclaw-gateway.service
          test -f scripts/agent-landscape.sh
          test -f scripts/bootstrap-openclaw.sh
          test -f scripts/install-gateway-systemd.sh
          test -f scripts/gateway-systemd-status.sh
          test -f scripts/setup-local-stt.sh
          test -f scripts/transcribe-local.sh
          test -f scripts/validate-local-setup.sh
          test -f bin/openclaw-local
          test -f workspace/AGENTS.md
          test -f workspace/BOOTSTRAP.md
          test -f workspace/HEARTBEAT.md
          test -f workspace/IDENTITY.md
          test -f workspace/MEMORY.md
          test -f workspace/SOUL.md
          test -f workspace/TOOLS.md
          test -f workspace/USER.md
          test -f workspace/WEBTERMINAL.md

      - name: Validate shell syntax
        run: |
          bash -n bin/openclaw-local
          bash -n bin/memory-find
          bash -n bin/memory-note
          bash -n scripts/agent-landscape.sh
          bash -n scripts/bootstrap-openclaw.sh
          bash -n scripts/gateway-systemd-status.sh
          bash -n scripts/gateway-tmux-status.sh
          bash -n scripts/install-gateway-systemd.sh
          bash -n scripts/publish-github.sh
          bash -n scripts/setup-local-stt.sh
          bash -n scripts/start-gateway-tmux.sh
          bash -n scripts/stop-gateway-tmux.sh
          bash -n scripts/transcribe-local.sh
          bash -n scripts/validate-local-setup.sh

      - name: Validate docs links target files
        run: |
          test -d docs
          test -d memory
          test -d workspace
